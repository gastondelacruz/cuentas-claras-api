name: CI

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts resolves DATABASE_URL eagerly via env(), even for
      # `prisma generate`, which never connects. Unit tests mock PrismaService,
      # so a placeholder is enough here; the real URL belongs to the e2e job.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm run test:e2e
      - run: pnpm run security:audit
