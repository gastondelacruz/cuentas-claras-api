name: Create Release PR

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: release-pr-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    if: >-
      ${{
        github.event.pull_request.merged == true &&
        !startsWith(github.event.pull_request.head.ref, 'chore/release-v')
      }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "26"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build application
        run: npm run build

      - name: Verify application
        run: npm run verify

      - name: Configure git identity
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          last_tag="$(git describe --tags \
            --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)"

          if [ -n "$last_tag" ]; then
            range="$last_tag..HEAD"
          else
            range="HEAD"
          fi

          commits="$(git log --format=%B "$range")"
          bump="patch"

          breaking_pattern='(^|[[:space:]])BREAKING CHANGE:'
          breaking_pattern+=$'|(^|[[:space:]])BREAKING-CHANGE:|!:'

          if printf '%s\n' "$commits" | grep -Eq "$breaking_pattern"; then
            bump="major"
          elif printf '%s\n' "$commits" | grep -Eq '^feat(\([^)]+\))?!?:'; then
            bump="minor"
          fi

          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Update release version
        id: version
        env:
          VERSION_BUMP: ${{ steps.bump.outputs.bump }}
        shell: bash
        run: |
          npm version "$VERSION_BUMP" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        id: branch
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          branch="chore/release-v${RELEASE_VERSION}"
          if git ls-remote --exit-code --heads origin \
            "$branch" >/dev/null 2>&1; then
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -b "$branch"
          git add package.json package-lock.json
          git commit -m "chore(release): v${RELEASE_VERSION}"
          git push --set-upstream origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Open release pull request
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ steps.branch.outputs.branch }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          existing_pr="$(gh pr list \
            --base main \
            --head "$RELEASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_pr" ]; then
            echo "Release PR already exists: #$existing_pr"
            exit 0
          fi

          body=$(cat <<EOF
          Automated semantic release for v${RELEASE_VERSION}.

          Merge this PR with squash merge.
          The tag workflow will publish the version and trigger Render.
          EOF
          )

          gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "chore(release): v${RELEASE_VERSION}" \
            --body "$body"
