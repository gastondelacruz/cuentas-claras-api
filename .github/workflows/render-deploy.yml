name: Production Deploy

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Verify and deploy to Render
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://localhost:5432/ci?schema=public"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Verify tag belongs to main
        run: |
          git fetch origin main --tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME does not point to a commit"
            echo "reachable from main."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "26"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build application
        run: npm run build

      - name: Verify application
        run: npm run verify

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret."
            exit 1
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --request POST \
            "$RENDER_DEPLOY_HOOK_URL"

      - name: Check production health
        env:
          RENDER_DEPLOY_HEALTH_URL: ${{ secrets.RENDER_DEPLOY_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HEALTH_URL" ]; then
            echo "Missing RENDER_DEPLOY_HEALTH_URL secret."
            exit 1
          fi

          for attempt in $(seq 1 18); do
            if curl \
              --fail \
              --show-error \
              --silent \
              "$RENDER_DEPLOY_HEALTH_URL"; then
              exit 0
            fi

            echo "Production health check failed. Attempt $attempt/18."
            sleep 10
          done

          echo "Production health check did not pass after deploy trigger."
          exit 1
