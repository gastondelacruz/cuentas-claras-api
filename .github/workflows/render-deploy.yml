name: Production Deploy

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Verify and deploy to Render
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://localhost:5432/ci?schema=public"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag belongs to main
        run: |
          git fetch origin main --tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME does not point to a commit"
            echo "reachable from main."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "26"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build application
        run: npm run build

      - name: Verify application
        run: npm run verify

      - name: Sync Render environment variables
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          REFRESH_DIGEST_SECRET: ${{ secrets.REFRESH_TOKEN_DIGEST_SECRET }}
          JWT_ACCESS_TTL: ${{ vars.JWT_ACCESS_TTL }}
          JWT_REFRESH_TTL: ${{ vars.JWT_REFRESH_TTL }}
          APP_PUBLIC_URL: ${{ vars.APP_PUBLIC_URL }}
          TRUST_PROXY_HOPS: ${{ vars.TRUST_PROXY_HOPS }}
          THROTTLE_DEFAULT_LIMIT: ${{ vars.THROTTLE_DEFAULT_LIMIT }}
          THROTTLE_DEFAULT_TTL: ${{ vars.THROTTLE_DEFAULT_TTL }}
          THROTTLE_AUTH_LIMIT: ${{ vars.THROTTLE_AUTH_LIMIT }}
          THROTTLE_AUTH_TTL: ${{ vars.THROTTLE_AUTH_TTL }}
          MAIL_PROVIDER: ${{ vars.MAIL_PROVIDER }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          node <<'NODE'
          (async () => {
            const required = [
              ["RENDER_API_KEY", process.env.RENDER_API_KEY],
              ["RENDER_SERVICE_ID", process.env.RENDER_SERVICE_ID],
              ["NODE_ENV", process.env.NODE_ENV],
              ["DATABASE_URL", process.env.DATABASE_URL],
              ["JWT_ACCESS_SECRET", process.env.JWT_ACCESS_SECRET],
              ["JWT_REFRESH_SECRET", process.env.JWT_REFRESH_SECRET],
              [
                "REFRESH_TOKEN_DIGEST_SECRET",
                process.env.REFRESH_DIGEST_SECRET,
              ],
              ["JWT_ACCESS_TTL", process.env.JWT_ACCESS_TTL],
              ["JWT_REFRESH_TTL", process.env.JWT_REFRESH_TTL],
              ["APP_PUBLIC_URL", process.env.APP_PUBLIC_URL],
              ["TRUST_PROXY_HOPS", process.env.TRUST_PROXY_HOPS],
              [
                "THROTTLE_DEFAULT_LIMIT",
                process.env.THROTTLE_DEFAULT_LIMIT,
              ],
              ["THROTTLE_DEFAULT_TTL", process.env.THROTTLE_DEFAULT_TTL],
              ["THROTTLE_AUTH_LIMIT", process.env.THROTTLE_AUTH_LIMIT],
              ["THROTTLE_AUTH_TTL", process.env.THROTTLE_AUTH_TTL],
              ["MAIL_PROVIDER", process.env.MAIL_PROVIDER],
              ["MAIL_FROM", process.env.MAIL_FROM],
              ["RESEND_API_KEY", process.env.RESEND_API_KEY],
            ];

            const envVars = required.map(([key, value]) => {
              if (!value) {
                throw new Error(`Missing ${key}.`);
              }

              return { key, value, generateValue: false };
            });

            const response = await fetch(
              `https://api.render.com/v1/services/${process.env.RENDER_SERVICE_ID}/env-vars`,
              {
                method: "PUT",
                headers: {
                  Authorization: `Bearer ${process.env.RENDER_API_KEY}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ envVars }),
              },
            );

            if (!response.ok) {
              const body = await response.text();
              throw new Error(
                `Render env sync failed (${response.status}): ${body}`,
              );
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret."
            exit 1
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --request POST \
            "$RENDER_DEPLOY_HOOK_URL"

      - name: Check production health
        env:
          RENDER_DEPLOY_HEALTH_URL: ${{ secrets.RENDER_DEPLOY_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HEALTH_URL" ]; then
            echo "Missing RENDER_DEPLOY_HEALTH_URL secret."
            exit 1
          fi

          for attempt in $(seq 1 18); do
            if curl \
              --fail \
              --show-error \
              --silent \
              "$RENDER_DEPLOY_HEALTH_URL"; then
              exit 0
            fi

            echo "Production health check failed. Attempt $attempt/18."
            sleep 10
          done

          echo "Production health check did not pass after deploy trigger."
          exit 1
