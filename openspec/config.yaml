project: cuentas-claras-api

stack:
  runtime: "Node.js 26"
  language: "TypeScript 6 (strict)"
  framework: "NestJS 11"
  orm: "Prisma 7 (driver adapter @prisma/adapter-pg)"
  database: "PostgreSQL 17 (docker compose)"
  validation: "class-validator / class-transformer, joi (env)"
  api_docs: "Swagger @nestjs/swagger — /docs"

architecture:
  style: "Hexagonal + Screaming (domain-first)"
  domains:
    - auth
    - users
    - groups
    - expenses
    - settlements
  transversal:
    - shared
    - config
    - prisma
    - health
  layer_order: "infrastructure -> application -> domain"
  domain_port_type: abstract_class
  dto_location: infrastructure/http
  persistence_adapter_location: infrastructure/persistence

testing:
  strict_tdd: true
  runner: vitest
  version: "4"
  compiler: "unplugin-swc (SWC, emitDecoratorMetadata=true, oxc=false)"
  unit:
    command: "npm test"
    pattern: "src/**/*.spec.ts"
    colocation: true
  e2e:
    command: "npm run test:e2e"
    config: "vitest.config.e2e.ts"
