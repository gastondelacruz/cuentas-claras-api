    framework: "supertest + Testcontainers (PostgreSQL)"
  coverage:
    command: "npm run test:cov"
    provider: v8
    reporters: ["text", "html", "lcov"]
    output_dir: "./coverage"

conventions:
  language: English
  indentation: tabs
  quotes: double
  semicolons: true
  type_imports: "import { type Foo }"
