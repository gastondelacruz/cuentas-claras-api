---
databases:
  - name: cuentas-claras-db
    plan: free
    databaseName: cuentas_claras
    user: cuentas_claras

services:
  - type: web
    name: cuentas-claras-api
    runtime: node
    plan: free
    branch: main
    autoDeployTrigger: "off"
    buildCommand: npm install --global pnpm@10.26.1 && pnpm install --frozen-lockfile && pnpm run prisma:generate && pnpm run build
    preDeployCommand: pnpm run prisma:migrate:deploy
    startCommand: pnpm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 26.0.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cuentas-claras-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REFRESH_TOKEN_DIGEST_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: APP_PUBLIC_URL
        value: cuentasclaras://
      - key: TRUST_PROXY_HOPS
        value: 1
      - key: THROTTLE_DEFAULT_LIMIT
        value: 100
      - key: THROTTLE_DEFAULT_TTL
        value: 60000
      - key: THROTTLE_AUTH_LIMIT
        value: 5
      - key: THROTTLE_AUTH_TTL
        value: 60000
      - key: MAIL_PROVIDER
        value: noop
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
