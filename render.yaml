---
databases:
  - name: cuentas-claras-db
    plan: free
    databaseName: cuentas_claras
    user: cuentas_claras

services:
  - type: web
    name: cuentas-claras-api
    runtime: node
    plan: free
    branch: main
    autoDeployTrigger: "off"
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:migrate:deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cuentas-claras-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REFRESH_TOKEN_DIGEST_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: APP_PUBLIC_URL
        value: cuentasclaras://
      - key: MAIL_PROVIDER
        value: noop
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
