services:
  postgres:
    image: postgres:17-alpine
    container_name: cuentas-claras-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cuentas_claras
      POSTGRES_PASSWORD: cuentas_claras
      POSTGRES_DB: cuentas_claras
    ports:
      - "5432:5432"
    volumes:
      - cuentas_claras_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuentas_claras -d cuentas_claras"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cuentas_claras_postgres_data:
